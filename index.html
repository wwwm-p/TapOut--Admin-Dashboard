<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Admin Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/admin-manifest.json">
  <meta name="theme-color" content="#0070c9">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body { background:#f4f5f7; color:#333; }
    body.dark { background:#101826; color:#e5e7eb; }

    .top-bar {
      display:flex; justify-content:space-between; align-items:center;
      background:#fff; padding:12px 24px; border-bottom:1px solid #ddd;
      position:sticky; top:0; z-index:100;
    }

    .container { display:flex; min-height:100vh; }

    .sidebar {
      width:240px; background:#2c3e50; color:white; display:flex; flex-direction:column;
    }

    .sidebar a {
      padding:16px; color:white; text-decoration:none;
    }

    .sidebar a:hover, .sidebar a.active { background:#34495e; }

    .main { flex:1; padding:24px; }

    .section {
      background:#fff; padding:16px; border-radius:8px; margin-bottom:20px;
    }

    .card-container { display:flex; gap:16px; flex-wrap:wrap; }

    .card {
      background:#fff; padding:16px; border-radius:8px;
      flex:1 1 200px;
    }

    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid #ddd; }

    .btn { background:#3498db; color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }

    .modal {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.6); justify-content:center; align-items:center;
    }

    .modal-content {
      background:#fff; padding:20px; border-radius:8px; width:90%; max-width:500px;
    }

    #loginModal { display:flex; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>Admin Sign In</h2>
    <form id="loginForm">
      <input type="text" id="adminUsername" placeholder="Username" required><br><br>
      <input type="password" id="adminPassword" placeholder="Password" required><br><br>
      <button class="btn">Sign In</button>
    </form>
  </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <div>Admin Dashboard</div>
  <button id="darkToggle">Dark Mode</button>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <a class="active" onclick="showSection('overview')">Home</a>
    <a onclick="showSection('counselors')">Counselors</a>
    <a onclick="showSection('students')">Students</a>
    <a onclick="showSection('schools')">Schools</a>
    <a onclick="showSection('notifications')">Notifications</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- OVERVIEW -->
    <div class="section" id="overview">
      <h2>Overview</h2>
      <div class="card-container" id="overviewCards"></div>
    </div>

    <!-- COUNSELORS -->
    <div class="section" id="counselors" style="display:none;">
      <h2>Counselors</h2>
      <table>
        <thead><tr><th>Name</th><th>Email</th></tr></thead>
        <tbody id="counselorTable"></tbody>
      </table>
    </div>

    <!-- STUDENTS -->
    <div class="section" id="students" style="display:none;">
      <h2>Students</h2>
      <table>
        <thead><tr><th>Name</th><th>Grade</th></tr></thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>

    <!-- SCHOOLS -->
    <div class="section" id="schools" style="display:none;">
      <h2>Schools</h2>
      <table>
        <thead><tr><th>Name</th><th>District</th></tr></thead>
        <tbody id="schoolTable"></tbody>
      </table>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="section" id="notifications" style="display:none;">
      <h2>Notifications</h2>
      <div id="notificationList"></div>
    </div>

  </div>
</div>

<script>
/* ===== FIXED NAV ===== */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';

  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  event.target.classList.add('active');
}

/* ===== DARK MODE ===== */
document.getElementById("darkToggle").onclick = () => {
  document.body.classList.toggle("dark");
};

/* ===== LOGIN ===== */
document.getElementById("loginForm").addEventListener("submit", (e)=>{
  e.preventDefault();
  document.getElementById("loginModal").style.display="none";
});

/* ===== SERVICE WORKER ===== */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>

</body>
</html>
